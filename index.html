<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Notation Scanner</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #0f0f1a, #1a1a40, #3a0ca3);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.container {
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 18px;
    padding: 25px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 25px rgba(58,12,163,0.5);
}

/* MENU */
.menu {
    display: flex;
    justify-content: space-around;
    margin-bottom: 15px;
    color: #ccc;
    font-size: 14px;
}

.menu span {
    cursor: pointer;
}

/* TITLE */
h1 {
    color: white;
    font-size: 20px;
    margin-bottom: 15px;
}

/* INPUT */
input, button {
    width: 100%;
    box-sizing: border-box;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #7209b7;
    color: white;
    cursor: pointer;
}

/* RESULT */
#result {
    margin-top: 15px;
    font-size: 16px;
    font-weight: bold;
}

/* COLORS */
.valid {
    color: #4caf50;
}
.decimal {
    color: #2196f3;
}
.invalid {
    color: #f44336;
}
</style>
</head>

<body>

<div class="container">

    <div class="menu">
        <span onclick="downloadHistory()">File</span>
        <span onclick="runCheck()">Run</span>
        <span onclick="showAbout()">About</span>
    </div>

    <h1>Scientific Notation Scanner</h1>

    <input type="text" id="input" placeholder="Example: -3.1 x 10^-3">

    <button onclick="runCheck()">Check</button>

    <div id="result"></div>

</div>

<script>
let historyData = [];

function runCheck() {
    let input = document.getElementById("input").value.trim();
    let result = document.getElementById("result");

    // Scientific Notation
    let sciRegex = /^[+-]?(\d+(\.\d+)?|\.\d+)\s*x\s*10\^[-+]?\d+$/i;

    // Decimal Number
    let decRegex = /^[+-]?(\d+(\.\d+)?|\.\d+)$/;

    if (sciRegex.test(input)) {
        result.innerText = "Valid Scientific Notation";
        result.className = "valid";
        historyData.push(input + " → Scientific");
    }
    else if (decRegex.test(input)) {
        result.innerText = "Decimal Number (Not Scientific)";
        result.className = "decimal";
        historyData.push(input + " → Decimal");
    }
    else {
        result.innerText = "Invalid Input or Format";
        result.className = "invalid";
        historyData.push(input + " → Invalid");
    }
}

// ENTER SUPPORT
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") runCheck();
});

// FILE
function downloadHistory() {
    let content = historyData.join("\n");
    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "result.txt";
    a.click();
}

// ABOUT
function showAbout() {
    alert("Swingly Moningka\n241011060046\nInformation System 24");
}
</script>

</body>
</html>
