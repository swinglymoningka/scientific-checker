<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Input Validator</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1a1a1a, #eaeaea);
        height: 100vh;
        margin: 0;
    }

    /* NAVBAR */
    .navbar {
        background: #111;
        color: white;
        padding: 10px;
        display: flex;
        gap: 20px;
    }

    .menu {
        cursor: pointer;
        position: relative;
    }

    .dropdown {
        display: none;
        position: absolute;
        background: white;
        color: black;
        top: 30px;
        left: 0;
        border-radius: 8px;
        box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        overflow: hidden;
    }

    .dropdown div {
        padding: 10px 15px;
        cursor: pointer;
    }

    .dropdown div:hover {
        background: #eee;
    }

    .menu:hover .dropdown {
        display: block;
    }

    /* MAIN UI */
    .container {
        background: white;
        padding: 35px;
        border-radius: 16px;
        text-align: center;
        width: 360px;
        margin: auto;
        margin-top: 100px;

        border: 1px solid #999;
        box-shadow: 0 0 10px rgba(0,0,0,0.2),
                    0 0 20px rgba(255,255,255,0.3);

        opacity: 0;
        transform: translateY(40px);
        animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    input {
        width: 90%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #bbb;
        margin-bottom: 15px;
        font-size: 15px;
    }

    button {
        background: black;
        color: white;
        border: 1px solid black;
        padding: 10px 22px;
        border-radius: 10px;
        cursor: pointer;
    }

    button:hover {
        background: white;
        color: black;
    }

    .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: 500;
    }

    /* MODAL */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="menu">File
        <div class="dropdown">
            <div onclick="downloadHistory()">Download History</div>
        </div>
    </div>

    <div class="menu" onclick="openAbout()">About Me</div>
</div>

<!-- MAIN -->
<div class="container">
    <h1>Input Validator</h1>

    <input type="text" id="input" placeholder="Type something here...">
    <br>
    <button onclick="checkInput()">Check</button>

    <div class="result" id="result"></div>
</div>

<!-- MODAL ABOUT -->
<div class="modal" id="aboutModal">
    <div class="modal-content">
        <h2>About Me</h2>
        <p>Name: Swingly Moningka</p>
        <p>NIM: 241011060046</p>
        <p>Class: Information System 24</p>
        <br>
        <button onclick="closeAbout()">Close</button>
    </div>
</div>

<script>
let historyData = [];

function checkInput() {
    let inputField = document.getElementById("input");
    let value = inputField.value;
    let result = document.getElementById("result");

    if (value.trim() === "") return;

    result.innerText = "Checking...";

    setTimeout(() => {
        let output;

        if (!isNaN(value)) {
            output = value + " → Number";
        } else {
            output = value + " → Not a Number";
        }

        result.innerText = output;
        historyData.push(output);

    }, 400);

    inputField.value = "";
}

// ENTER support
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkInput();
    }
});

// DOWNLOAD FILE
function downloadHistory() {
    let content = historyData.join("\n");
    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "history.txt";
    a.click();
}

// ABOUT MODAL
function openAbout() {
    document.getElementById("aboutModal").style.display = "flex";
}

function closeAbout() {
    document.getElementById("aboutModal").style.display = "none";
}
</script>

</body>
</html>
