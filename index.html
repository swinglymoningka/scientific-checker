<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Input Validator</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1a1a1a, #eaeaea);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        overflow: hidden;
    }

    .container {
        background: #ffffff;
        padding: 35px;
        border-radius: 16px;
        text-align: center;
        width: 360px;

        /* Glow futuristik */
        border: 1px solid #999;
        box-shadow: 0 0 10px rgba(0,0,0,0.2),
                    0 0 20px rgba(255,255,255,0.3);

        /* Animasi masuk */
        opacity: 0;
        transform: translateY(40px);
        animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h1 {
        margin-bottom: 5px;
        color: #222;
        letter-spacing: 1px;
    }

    .author {
        font-size: 13px;
        color: #777;
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #bbb;
        margin-bottom: 15px;
        font-size: 15px;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: black;
        box-shadow: 0 0 8px rgba(0,0,0,0.3);
    }

    button {
        background: black;
        color: white;
        border: 1px solid black;
        padding: 10px 22px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;
        transition: 0.3s;
    }

    button:hover {
        background: white;
        color: black;
        border: 1px solid black;
    }

    .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: 500;
        opacity: 0;
        transform: translateY(10px);
        transition: 0.3s;
    }

    .show {
        opacity: 1;
        transform: translateY(0);
    }

    .valid {
        color: #2e7d32;
    }

    .invalid {
        color: #c62828;
    }

    #history {
        margin-top: 15px;
        font-size: 12px;
        color: #555;
        max-height: 80px;
        overflow-y: auto;
        border-top: 1px solid #ddd;
        padding-top: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Input Validator</h1>
    <div class="author">Swingly Moningka - 241011060046</div>

    <input type="text" id="input" placeholder="Type something here...">
    <br>
    <button onclick="checkInput()">Check</button>

    <div class="result" id="result"></div>
    <div id="history"></div>
</div>

<script>
function checkInput() {
    let inputField = document.getElementById("input");
    let result = document.getElementById("result");
    let historyDiv = document.getElementById("history");
    let value = inputField.value;

    if (value.trim() === "") return;

    // Animasi checking
    result.innerText = "Checking...";
    result.className = "result show";

    setTimeout(() => {
        if (!isNaN(value)) {
            result.innerText = "This is a number.";
            result.className = "result valid show";
        } else {
            result.innerText = "This is not a number.";
            result.className = "result invalid show";
        }

        // Tambah ke history
        historyDiv.innerHTML += value + "<br>";

    }, 500);

    // Kosongkan input
    inputField.value = "";
}

// ENTER buat check
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkInput();
    }
});
</script>

</body>
</html>
