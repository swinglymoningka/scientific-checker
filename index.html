<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Number Checker</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #1b1b2f, #16213e, #3a0ca3);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* TOP BUTTON */
.top-bar {
    margin-top: 20px;
}

.top-btn {
    padding: 8px 15px;
    margin: 5px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
}

/* CENTER WRAPPER */
.wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
}

/* CARD */
.container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 16px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    animation: fadeDown 1s ease;
}

@keyframes fadeDown {
    from {
        opacity: 0;
        transform: translateY(-40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    color: white;
    font-size: 22px;
    margin-bottom: 20px;
}

/* FIX SEJAJAR */
input, button {
    width: 100%;
    box-sizing: border-box;
}

/* INPUT */
input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
}

/* BUTTON */
button {
    background: #7209b7;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #9d4edd;
}

/* HISTORY */
#history {
    margin-top: 15px;
    font-size: 13px;
    color: white;
}

/* ABOUT */
#about {
    margin-top: 10px;
    font-size: 13px;
    color: #ddd;
}
</style>
</head>

<body>

<div class="top-bar">
    <span class="top-btn" onclick="downloadHistory()">File</span>
    <span class="top-btn" onclick="toggleAbout()">About Me</span>
</div>

<div class="wrapper">
    <div class="container">
        <h1>Scientific Number Checker</h1>

        <input type="text" id="input" placeholder="Type something here...">
        <button onclick="checkInput()">Check</button>

        <div id="history"></div>
        <div id="about"></div>
    </div>
</div>

<script>
let historyData = [];
let aboutVisible = false;

function checkInput() {
    let inputField = document.getElementById("input");
    let historyDiv = document.getElementById("history");
    let value = inputField.value;

    if (value.trim() === "") return;

    let output;

    if (!isNaN(value)) {
        output = value + " → is a number";
    } else {
        output = value + " → not a number";
    }

    historyData.push(output);
    historyDiv.innerHTML = historyData.join("<br>");

    inputField.value = "";
}

document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") checkInput();
});

function downloadHistory() {
    let content = "Scientific Number Checker Log\n\n" + historyData.join("\n");
    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "history.txt";
    a.click();
}

function toggleAbout() {
    let about = document.getElementById("about");

    if (!aboutVisible) {
        about.innerHTML = `
            <hr>
            Name: Swingly Moningka<br>
            NIM: 241011060046<br>
            Class: Information System 24
        `;
        aboutVisible = true;
    } else {
        about.innerHTML = "";
        aboutVisible = false;
    }
}
</script>

</body>
</html>
