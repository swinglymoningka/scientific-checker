<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Input Analyzer</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        width: 350px;
    }

    h1 {
        margin-bottom: 5px;
    }

    .author {
        font-size: 12px;
        color: gray;
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        font-size: 16px;
    }

    button {
        background: #667eea;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #5a67d8;
    }

    .result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }

    .valid {
        color: green;
    }

    .invalid {
        color: red;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Smart Input Analyzer</h1>
    <div class="author">By Swingly Moningka</div>

    <input type="text" id="input" placeholder="Enter your input...">
    <br>
    <button onclick="checkInput()">Analyze</button>

    <div class="result" id="result"></div>
</div>

<script>
function checkInput() {
    let value = document.getElementById("input").value;

    if (!isNaN(value) && value.trim() !== "") {
        document.getElementById("result").innerText = "✅ Valid Number";
        document.getElementById("result").className = "result valid";
    } else {
        document.getElementById("result").innerText = "❌ Invalid Input";
        document.getElementById("result").className = "result invalid";
    }
}
</script>

</body>
</html>
