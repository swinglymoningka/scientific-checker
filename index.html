<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Input Validator</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #2c2c2c, #f2f2f2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: #ffffff;
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        text-align: center;
        width: 360px;
    }

    h1 {
        margin-bottom: 5px;
        color: #333;
    }

    .author {
        font-size: 13px;
        color: #666;
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        font-size: 15px;
        outline: none;
        transition: 0.2s;
    }

    input:focus {
        border-color: #777;
    }

    button {
        background: #444;
        color: white;
        border: none;
        padding: 10px 22px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;
        transition: 0.2s;
    }

    button:hover {
        background: #222;
    }

    .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: 500;
    }

    .valid {
        color: #2e7d32;
    }

    .invalid {
        color: #c62828;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Input Validator</h1>
    <div class="author">Swingly Moningka - 241011060046</div>

    <input type="text" id="input" placeholder="Type something here...">
    <br>
    <button onclick="checkInput()">Check</button>

    <div class="result" id="result"></div>
</div>

<script>
function checkInput() {
    let inputField = document.getElementById("input");
    let value = inputField.value;

    if (!isNaN(value) && value.trim() !== "") {
        document.getElementById("result").innerText = "This is a number.";
        document.getElementById("result").className = "result valid";
    } else {
        document.getElementById("result").innerText = "This is not a number.";
        document.getElementById("result").className = "result invalid";
    }

    inputField.value = "";
}
</script>

</body>
</html>
