<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Notation Scanner</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* ANIMATED BACKGROUND */
    background: linear-gradient(-45deg, #0f0f1a, #1a1a40, #3a0ca3, #7209b7);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* CARD */
.container {
    width: 90%;
    max-width: 400px;
    padding: 25px;
    border-radius: 18px;
    text-align: center;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);

    /* GLOW BORDER */
    border: 2px solid transparent;
    background-clip: padding-box;
    box-shadow: 0 0 20px rgba(114,9,183,0.5),
                0 0 40px rgba(58,12,163,0.4);

    animation: glowPulse 2.5s infinite;
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 15px rgba(114,9,183,0.4); }
    50% { box-shadow: 0 0 30px rgba(58,12,163,0.8); }
    100% { box-shadow: 0 0 15px rgba(114,9,183,0.4); }
}

/* MENU */
.menu {
    display: flex;
    justify-content: space-around;
    margin-bottom: 15px;
    color: #aaa;
}

.menu span {
    cursor: pointer;
    transition: 0.3s;
}

.menu span:hover {
    color: white;
}

/* TITLE */
h1 {
    color: white;
    font-size: 20px;
}

/* INPUT */
input, button {
    width: 100%;
    box-sizing: border-box;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
}

input::placeholder {
    color: #ccc;
}

/* BUTTON */
button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #7209b7, #3a0ca3);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* RESULT */
#result {
    margin-top: 15px;
    font-size: 16px;
    font-weight: bold;
    transition: 0.3s;
}

.valid { color: #00ffae; }
.decimal { color: #4cc9f0; }
.invalid { color: #ff4d6d; }
</style>
</head>

<body>

<div class="container">

    <div class="menu">
        <span onclick="downloadHistory()">File</span>
        <span onclick="runCheck()">Run</span>
        <span onclick="showAbout()">About</span>
    </div>

    <h1>Scientific Notation Scanner</h1>

    <input type="text" id="input" placeholder="Example: -3.1 x 10^-3">

    <button onclick="runCheck()">Check</button>

    <div id="result"></div>

</div>

<script>
let historyData = [];

function runCheck() {
    let input = document.getElementById("input").value.trim();
    let result = document.getElementById("result");

    let sciRegex = /^[+-]?(\d+(\.\d+)?|\.\d+)\s*x\s*10\^[-+]?\d+$/i;
    let decRegex = /^[+-]?(\d+(\.\d+)?|\.\d+)$/;

    if (sciRegex.test(input)) {
        result.innerText = "Valid Scientific Notation";
        result.className = "valid";
        historyData.push(input + " → Scientific");
    }
    else if (decRegex.test(input)) {
        result.innerText = "Decimal Number (Not Scientific)";
        result.className = "decimal";
        historyData.push(input + " → Decimal");
    }
    else {
        result.innerText = "Invalid Input or Format";
        result.className = "invalid";
        historyData.push(input + " → Invalid");
    }
}

document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") runCheck();
});

function downloadHistory() {
    let blob = new Blob([historyData.join("\n")], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "result.txt";
    a.click();
}

function showAbout() {
    alert("Swingly Moningka\n241011060046\nInformation System 24");
}
</script>

</body>
</html>
