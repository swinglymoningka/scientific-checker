<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Number Checker</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1b1b2f, #16213e, #3a0ca3);
    margin: 0;
}

/* TOP BUTTONS */
.top-bar {
    text-align: center;
    margin-top: 20px;
}

.top-btn {
    display: inline-block;
    padding: 8px 15px;
    margin: 5px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.3s;
}

.top-btn:hover {
    background: rgba(255,255,255,0.2);
}

/* CARD */
.container {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 16px;
    width: 360px;
    margin: auto;
    margin-top: 40px;
    text-align: center;

    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 20px rgba(0,0,0,0.3),
                0 0 30px rgba(138,43,226,0.3);

    /* ANIMASI DARI ATAS */
    opacity: 0;
    transform: translateY(-40px);
    animation: fadeDown 1s ease forwards;
}

@keyframes fadeDown {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    margin-bottom: 5px;
    color: #222;
}

.subtitle {
    font-size: 12px;
    color: #666;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #aaa;
    margin-bottom: 10px;
}

button {
    background: #3a0ca3;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #7209b7;
}

/* HISTORY */
#history {
    margin-top: 15px;
    font-size: 13px;
    color: #333;
    border-top: 1px solid #ddd;
    padding-top: 10px;
    text-align: center;
}

/* ABOUT */
#about {
    margin-top: 15px;
    font-size: 13px;
    color: #444;
}
</style>
</head>

<body>

<!-- TOP BUTTONS -->
<div class="top-bar">
    <span class="top-btn" onclick="downloadHistory()">File</span>
    <span class="top-btn" onclick="toggleAbout()">About Me</span>
</div>

<!-- MAIN -->
<div class="container">
    <h1>Scientific Number Checker</h1>
    <div class="subtitle">input • check • number • validation</div>

    <input type="text" id="input" placeholder="Type something here...">
    <br>
    <button onclick="checkInput()">Check</button>

    <div id="history"></div>
    <div id="about"></div>
</div>

<script>
let historyData = [];
let aboutVisible = false;

function checkInput() {
    let inputField = document.getElementById("input");
    let historyDiv = document.getElementById("history");
    let value = inputField.value;

    if (value.trim() === "") return;

    let output;

    if (!isNaN(value)) {
        output = value + " → is a number";
    } else {
        output = value + " → not a number";
    }

    historyData.push(output);

    historyDiv.innerHTML = historyData.join("<br>");

    inputField.value = "";
}

// ENTER SUPPORT
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkInput();
    }
});

// DOWNLOAD LANGSUNG
function downloadHistory() {
    let content = "Scientific Number Checker Log\n\n" + historyData.join("\n");
    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "history.txt";
    a.click();
}

// ABOUT TOGGLE
function toggleAbout() {
    let about = document.getElementById("about");

    if (!aboutVisible) {
        about.innerHTML = `
            <hr>
            Name: Swingly Moningka<br>
            NIM: 241011060046<br>
            Class: Information System 24
        `;
        aboutVisible = true;
    } else {
        about.innerHTML = "";
        aboutVisible = false;
    }
}
</script>

</body>
</html>
